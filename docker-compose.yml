services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    restart: always

  auth-server:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: auth-server
    restart: unless-stopped
    ports:
      - "7000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - /root/auth-data/certs/openiddict.pfx:/app/certs/openiddict.pfx:ro

volumes:
  postgres_data: