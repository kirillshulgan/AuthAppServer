services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  auth-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-server
    restart: unless-stopped
    ports:
      - "7000:8080"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - /root/auth-data/certs/openiddict.pfx:/app/certs/openiddict.pfx:ro

volumes:
  postgres_data: